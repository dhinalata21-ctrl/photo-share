<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Enter PIN</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0c0f14;
    color: #f4f6f8;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #161b22;
    border: 1px solid #2a3340;
    border-radius: 18px;
    padding: 28px 24px;
  }
  h1 { font-size: 1.35rem; margin-bottom: 8px; }
  p { color: #9aa4b2; font-size: 0.92rem; line-height: 1.45; margin-bottom: 20px; }
  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #2a3340;
    background: #0c0f14;
    color: #f4f6f8;
    font-size: 1.05rem;
    margin-bottom: 14px;
  }
  input:focus { outline: 2px solid #f0a830; border-color: #f0a830; }
  button {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 12px;
    background: #f0a830;
    color: #0c0f14;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: wait; }
  .error {
    color: #ff7b7b;
    font-size: 0.88rem;
    min-height: 1.2rem;
    margin-bottom: 8px;
  }
  .hint {
    margin-top: 16px;
    font-size: 0.82rem;
    color: #9aa4b2;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Protected album</h1>
    <p>This link is PIN-protected. Enter the PIN or phrase shared with you.</p>
    <div class="error" id="error"></div>
    <form id="form">
      <input id="pin" type="password" inputmode="text" autocomplete="off" placeholder="PIN or phrase" required>
      <button type="submit" id="btn">Unlock album</button>
    </form>
    <p class="hint">Scanning the QR code on the host PC skips this step.</p>
  </div>
<script>
const form = document.getElementById('form');
const pinInput = document.getElementById('pin');
const errorEl = document.getElementById('error');
const btn = document.getElementById('btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Checking…';
  try {
    const res = await fetch('/api/unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pinInput.value }),
    });
    if (res.ok) {
      window.location.href = '/';
      return;
    }
    const data = await res.json().catch(() => ({}));
    errorEl.textContent = data.error === 'too_many_attempts'
      ? 'Too many tries. Wait a few minutes and try again.'
      : (data.error || 'Wrong PIN. Try again.');
  } catch (err) {
    errorEl.textContent = 'Could not connect. Check Wi-Fi.';
  }
  btn.disabled = false;
  btn.textContent = 'Unlock album';
  pinInput.select();
});
pinInput.focus();
</script>
</body>
</html>
